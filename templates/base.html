<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}InvenTrack{% endblock %} — Sistem Inventaris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2236;
  --border: #1e2d45;
  --accent: #00e5ff;
  --accent2: #7c3aed;
  --accent3: #f59e0b;
  --danger: #ef4444;
  --success: #10b981;
  --text: #e2e8f0;
  --muted: #64748b;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  min-height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  z-index: 100;
}
.sidebar-logo {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  font-family: var(--mono);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -1px;
}
.logo-sub {
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 2px;
}
.nav-section {
  padding: 20px 12px;
  flex: 1;
}
.nav-label {
  font-size: 0.6rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 12px;
  margin-bottom: 8px;
}
.nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  text-decoration: none;
  color: var(--muted);
  font-size: 0.875rem;
  font-weight: 500;
  transition: all .2s;
  margin-bottom: 2px;
}
.nav-link:hover { background: var(--surface2); color: var(--text); }
.nav-link.active { background: rgba(0,229,255,.08); color: var(--accent); border: 1px solid rgba(0,229,255,.15); }
.nav-icon { width: 18px; text-align: center; font-size: 1rem; }
.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  font-size: 0.7rem;
  color: var(--muted);
  font-family: var(--mono);
}

/* MAIN */
.main {
  margin-left: 240px;
  flex: 1;
  min-height: 100vh;
}
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.page-title {
  font-family: var(--mono);
  font-size: 1rem;
  color: var(--accent);
}
.page-subtitle { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
.content { padding: 32px; }

/* CARDS */
.stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 32px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s;
}
.stat-card:hover { border-color: var(--accent); }
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--card-accent, var(--accent));
}
.stat-label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.stat-value { font-family: var(--mono); font-size: 2rem; font-weight: 700; color: var(--text); line-height: 1; }
.stat-icon { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; opacity: .3; }

/* TABLES */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 24px;
}
.card-header {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title { font-family: var(--mono); font-size: 0.85rem; color: var(--accent); }
.card-body { padding: 0; }
table { width: 100%; border-collapse: collapse; }
th {
  background: var(--surface2);
  padding: 12px 16px;
  text-align: left;
  font-size: 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
  font-family: var(--mono);
}
td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 0.875rem;
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }

/* BADGES */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  font-family: var(--mono);
  letter-spacing: .5px;
}
.badge-info { background: rgba(0,229,255,.1); color: var(--accent); border: 1px solid rgba(0,229,255,.2); }
.badge-success { background: rgba(16,185,129,.1); color: var(--success); border: 1px solid rgba(16,185,129,.2); }
.badge-warning { background: rgba(245,158,11,.1); color: var(--accent3); border: 1px solid rgba(245,158,11,.2); }
.badge-danger { background: rgba(239,68,68,.1); color: var(--danger); border: 1px solid rgba(239,68,68,.2); }
.badge-purple { background: rgba(124,58,237,.1); color: #a78bfa; border: 1px solid rgba(124,58,237,.2); }

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  border: none;
  transition: all .2s;
  font-family: var(--sans);
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: #00b8d4; }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #059669; }
.btn-sm { padding: 5px 10px; font-size: 0.75rem; }
.btn-export { background: rgba(245,158,11,.1); color: var(--accent3); border: 1px solid rgba(245,158,11,.2); }
.btn-export:hover { background: rgba(245,158,11,.2); }

/* FORMS */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1/-1; }
label { font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-weight: 600; }
input, select, textarea {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 0.875rem;
  transition: border-color .2s;
  outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 80px; }
select option { background: var(--surface2); }

/* SEARCH BAR */
.search-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.search-bar input, .search-bar select { flex: 1; min-width: 180px; }

/* ALERT */
.alert {
  padding: 14px 18px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 0.875rem;
  border-left: 3px solid;
}
.alert-danger { background: rgba(239,68,68,.08); border-color: var(--danger); color: #fca5a5; }

/* STOK BAR */
.stok-bar { width: 80px; height: 6px; background: var(--border); border-radius: 3px; }
.stok-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }

/* EMPTY */
.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--muted);
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: .3; }

/* GRID 2 COL */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

@media (max-width: 900px) {
  .sidebar { width: 60px; }
  .sidebar-logo, .nav-label, .sidebar-footer { display: none; }
  .nav-link span { display: none; }
  .main { margin-left: 60px; }
  .stat-grid { grid-template-columns: repeat(2,1fr); }
  .grid-2 { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .content { padding: 20px; }
}

/* CHART canvas */
canvas { max-height: 220px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">InvenTrack</div>
    <div class="logo-sub">Sistem Inventaris</div>
  </div>
  <nav class="nav-section">
    <div class="nav-label">Menu Utama</div>
    <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}">
      <span class="nav-icon">◈</span><span>Dashboard</span>
    </a>
    <a href="{{ url_for('barang') }}" class="nav-link {% if 'barang' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">◻</span><span>Data Barang</span>
    </a>
    <a href="{{ url_for('peminjaman') }}" class="nav-link {% if 'peminjaman' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">◷</span><span>Peminjaman</span>
    </a>
    <div class="nav-label" style="margin-top:16px">Laporan</div>
    <a href="{{ url_for('export_barang') }}" class="nav-link">
      <span class="nav-icon">↓</span><span>Export Barang</span>
    </a>
    <a href="{{ url_for('export_peminjaman') }}" class="nav-link">
      <span class="nav-icon">↓</span><span>Export Peminjaman</span>
    </a>
  </nav>
  <div class="sidebar-footer">v1.0 // 2025</div>
</aside>
<div class="main">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</body>
</html>
